<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการข้อมูลตาราง</title>
    <style>
        :root {
            --primary-color: #4CAF50;
            --danger-color: #f44336;
            --export-color: #2196F3;
            --bg-color: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 { text-align: center; color: #2c3e50; }
        .form-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 10px;
            margin-bottom: 20px;
            align-items: end;
        }
        .form-group { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: background 0.3s;
        }
        .btn-add { background-color: var(--primary-color); }
        .btn-add:hover { background-color: #45a049; }
        .btn-delete { background-color: var(--danger-color); padding: 5px 10px; font-size: 12px;}
        .btn-delete:hover { background-color: #da190b; }
        .btn-export { background-color: var(--export-color); width: 100%; margin-bottom: 10px;}
        .btn-export:hover { background-color: #0b7dda; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #e0e0e0;
            padding: 12px;
            text-align: left;
        }
        th { background-color: #f8f9fa; font-weight: bold; }
        .text-center { text-align: center; }
        
        /* Responsive */
        @media (max-width: 768px) {
            .form-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

        </div>

                <input type="text" id="name" placeholder="ระบุชื่อ...">
